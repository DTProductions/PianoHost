<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Your Piano - Piano Host</title>
    <link rel="stylesheet" href="css/proposal.css">
</head>
<body>

<header>
    <div class="container header-container">
        <h1>Piano Host</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="colecao.html">Pianos</a>
            <a href="#">Contact</a>
            <a href="login.html">My Account</a>
        </nav>
    </div>
</header>

<section class="hero small-hero">
    <div class="container">
        <h2>Submit Your Piano</h2>
        <p>Tell us about your instrument and get an evaluation</p>
    </div>
</section>

<section class="form-section">
    <div class="container">
        <form class="proposal-form">

            <h3>Piano Information</h3>

            <input type="text" placeholder="Brand (e.g. Yamaha)" required>
            <input type="text" placeholder="Model (e.g. U3)" required>

            <select required>
                <option value="">Type</option>
                <option>Upright</option>
                <option>Grand</option>
                <option>Digital</option>
            </select>

            <select required>
                <option value="">Condition</option>
                <option>Excellent</option>
                <option>Very Good</option>
                <option>Good</option>
                <option>Needs Repair</option>
            </select>

            <textarea placeholder="Describe the piano (age, sound quality, history...)" required></textarea>

            <h3>Media Upload</h3>

            <label>Upload Photos</label>
            <input type="file" multiple accept="image/*">

            <label>Upload Videos</label>
            <input type="file" multiple accept="video/*">

            <h3>Contact Information</h3>

            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Email" required>
            <input type="tel" placeholder="Phone Number">

            <button type="submit">Submit Proposal</button>

        </form>
    </div>
</section>

<footer>
    <div class="container">
        <p>© 2026 Piano Host - Used Piano Marketplace</p>
    </div>
</footer>

</body>
</html>
